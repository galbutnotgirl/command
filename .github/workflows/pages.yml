name: Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "test/test-docs.py"
      - "test/test-pages.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docs quality checks
        run: python3 ./test/test-docs.py
      - name: Pages-specific checks
        run: python3 ./test/test-pages.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
