name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # FluidAudio (a dependency of the executable target, pulled in when
      # resolving the package graph even though tests don't touch it) needs
      # Swift 6 tools — macos-14's default Xcode only has Swift 5.10.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift unit tests (ClaudeCommandCoreTests)
        working-directory: agent
        run: swift test

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Node tests (vendored capture core)
        working-directory: vendor/claude-command-capture
        run: node --test

      - name: Shell tests (prompt/context matching)
        run: ./test/test-shell.sh

      - name: Release signing policy tests
        run: ./test/test-release-policy.sh

      - name: Docs quality tests
        run: python3 ./test/test-docs.py

      - name: String review round-trip tests
        run: python3 ./test/test_string_review.py

      - name: Release asset smoke test
        run: |
          ./release.sh --skip-checks
          ./test/test-release-asset.sh
